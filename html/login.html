<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - Aminovita</title>   

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="../css/auth.css">

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <link rel="icon" href="../assets/img/iconos/AMINOVITA_A.png" type="image/png">
</head>

<body class="d-flex flex-column vh-100 position-relative">

<nav class="navbar navbar-expand-lg">
      <div class="container-fluid px-4">
        <a class="navbar-brand p-0" href="./index.html">
            <img src="../assets/img/iconos/AQ1.png" alt="Aminovita Logo" class="img-fluid" style="height: 60px; width: auto;">
        </a>
        <div class="d-flex">
            <a href="./index.html" class="btn btn-outline-secondary btn-sm rounded-pill px-4 border-2 fw-bold" style="color: #6c757d; border-color: #e1e8ed;">
                CANCELAR
            </a>
        </div>
      </div>
    </nav>

    <div class="flex-grow-1 d-flex justify-content-center align-items-center p-3">
        <div class="row w-100 justify-content-center">
            
            <div class="col-12 col-md-6 col-lg-4 contenido-animado">
                
                <div class="login-card p-4 p-md-5">
                    <div style="height: 6px; width: 100%; background: linear-gradient(90deg, #8A8AF6 0%, #6CDBE3 100%); position: absolute; top: 0; left: 0;"></div>

                    <div class="text-center mb-4 mt-2">
                        <h2 class="login-title">Bienvenido de nuevo</h2>
                        <p class="login-subtitle">Ingresa tus datos para acceder</p>
                    </div>
                
                    <form id="loginForm" class="needs-validation" novalidate>
    
                        <div class="custom-input-group d-flex align-items-center">
                            <i class="fa-regular fa-envelope input-icon ps-2"></i>
                            <input class="form-control custom-input" type="email" id="email" placeholder="Correo electrónico" required>
                        </div>

                        <div class="custom-input-group d-flex align-items-center mt-3">
                            <i class="fa-solid fa-lock input-icon ps-2"></i>
                            <input class="form-control custom-input" type="password" id="password" placeholder="Contraseña" required>
                        </div>
                        
                        <div class="d-flex justify-content-end mb-4">
                            <a href="#" class="small-link" data-bs-toggle="modal" data-bs-target="#modalRecuperar">
                                ¿Olvidaste tu contraseña?
                            </a>
                        </div>
                        
                        <div class="mb-4">
                            <button type="submit" class="btn btn-glow">
                                INICIAR SESIÓN
                            </button>
                        </div>

                        <div class="text-center">
                            <span style="color: #6c757d; font-size: 0.9rem;">¿Aún no tienes cuenta?</span>
                            <a href="./registro.html" class="fw-bold text-decoration-none ms-1" style="color: #6CDBE3;">¡Regístrate aquí!</a>
                        </div>

                    </form>
                </div>

            </div>
        </div>
    </div>

    <div class="container-fluid py-3 mt-auto">
        <div class="row">
            <div class="col-12 text-center footer-text">
                <p class="m-0">
                    &copy; 2026 Aminovita y Químicos. Todos los derechos reservados.
                </p>
            </div>
        </div>
    </div>

    <div class="modal fade" id="modalRecuperar" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
          <div class="modal-content rounded-4 border-0 shadow">
            <div class="modal-header border-0">
              <h5 class="modal-title fw-bold text-dark">Recuperar Contraseña</h5>
              <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
              <p class="small text-muted">Ingresa tu correo asociado y te enviaremos las instrucciones.</p>
              <form id="formRecuperar" onsubmit="event.preventDefault();">
                  <div class="custom-input-group d-flex align-items-center mb-0">
                    <i class="fa-regular fa-envelope input-icon ps-2"></i>
                    <input type="email" class="form-control custom-input" id="emailRecuperarInput" placeholder="tucorreo@ejemplo.com" required>
                  </div>
              </form>
            </div>
            <div class="modal-footer border-0">
              <button type="button" class="btn btn-light btn-sm rounded-pill px-3" data-bs-dismiss="modal">Cancelar</button>
              <button type="button" class="btn btn-glow btn-sm rounded-pill px-4" style="width: auto;" onclick="enviarRecuperacion()">Enviar Instrucciones</button>
            </div>
          </div>
        </div>
    </div>

    <!-- Scripts propios -->
    <script src="../assets/js/config.js"></script>
    <script src="../assets/js/login.js"></script>

</body>
</html>
