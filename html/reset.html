<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nueva Contraseña - Aminovita</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/reset.css">

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <link rel="icon" href="../assets/img/iconos/AMINOVITA_A.png" type="image/png">
</head>

<body>

<div class="container">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="card p-4 shadow-lg">
                    <h3 class="text-center mb-4 text-success">Nueva Contraseña</h3>
                    <p class="text-center text-muted small">Ingresa tu nueva clave segura.</p>
                    
                    <form id="formReset">
                        <div class="mb-3">
                            <input type="password" id="password" class="form-control" placeholder="Nueva contraseña" required minlength="6">
                        </div>
                        <div class="mb-4">
                            <input type="password" id="confirmPassword" class="form-control" placeholder="Confirmar contraseña" required minlength="6">
                        </div>
                        <button type="submit" class="btn btn-glow">Cambiar Contraseña</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts propios -->
    <script src="../assets/js/config.js"></script>
    <script src="../assets/js/reset.js"></script>

</body>
</html>
